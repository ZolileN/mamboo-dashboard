<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <style>
    .title { font: 700 30px Arial, sans-serif; fill: #111827; }
    .subtitle { font: 400 16px Arial, sans-serif; fill: #4b5563; }
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 14; ry: 14; }
    .header { fill: #111827; rx: 14; ry: 14; }
    .htext { font: 700 20px Arial, sans-serif; fill: white; }
    .field { font: 15px 'Courier New', monospace; fill: #111827; }
    .pk { font-weight: 700; }
    .fk { fill: #0f766e; }
    .line { stroke: #6b7280; stroke-width: 2.5; fill: none; }
    .crow { stroke: #6b7280; stroke-width: 2.5; fill: none; }
    .label { font: 700 14px Arial, sans-serif; fill: #374151; }
  </style>

  <text x="60" y="52" class="title">Mamboo Retail Dashboard — Entity Relationship Diagram</text>
  <text x="60" y="82" class="subtitle">Core entities for sales, products, stores, promotions, customers, and inventory snapshots</text>

  <!-- STORES -->
  <rect x="70" y="150" width="290" height="220" class="box"/>
  <rect x="70" y="150" width="290" height="44" class="header"/>
  <text x="215" y="179" text-anchor="middle" class="htext">STORES</text>
  <text x="92" y="222" class="field pk">PK  store_id</text>
  <text x="92" y="250" class="field">store_name</text>
  <text x="92" y="278" class="field">province</text>
  <text x="92" y="306" class="field">city</text>
  <text x="92" y="334" class="field">format_type</text>

  <!-- PRODUCTS -->
  <rect x="650" y="120" width="300" height="280" class="box"/>
  <rect x="650" y="120" width="300" height="44" class="header"/>
  <text x="800" y="149" text-anchor="middle" class="htext">PRODUCTS</text>
  <text x="672" y="192" class="field pk">PK  product_id</text>
  <text x="672" y="220" class="field">sku</text>
  <text x="672" y="248" class="field">category</text>
  <text x="672" y="276" class="field">subcategory</text>
  <text x="672" y="304" class="field">product_name</text>
  <text x="672" y="332" class="field">unit_cost</text>
  <text x="672" y="360" class="field">unit_price</text>

  <!-- CUSTOMERS -->
  <rect x="1180" y="150" width="300" height="190" class="box"/>
  <rect x="1180" y="150" width="300" height="44" class="header"/>
  <text x="1330" y="179" text-anchor="middle" class="htext">CUSTOMERS</text>
  <text x="1202" y="222" class="field pk">PK  customer_id</text>
  <text x="1202" y="250" class="field">customer_segment</text>
  <text x="1202" y="278" class="field">loyalty_tier</text>

  <!-- PROMOTIONS -->
  <rect x="1180" y="430" width="300" height="250" class="box"/>
  <rect x="1180" y="430" width="300" height="44" class="header"/>
  <text x="1330" y="459" text-anchor="middle" class="htext">PROMOTIONS</text>
  <text x="1202" y="502" class="field pk">PK  promo_id</text>
  <text x="1202" y="530" class="field">promo_name</text>
  <text x="1202" y="558" class="field">promo_type</text>
  <text x="1202" y="586" class="field">discount_pct</text>
  <text x="1202" y="614" class="field">start_date</text>
  <text x="1202" y="642" class="field">end_date</text>

  <!-- SALES_TRANSACTIONS -->
  <rect x="580" y="470" width="440" height="340" class="box"/>
  <rect x="580" y="470" width="440" height="44" class="header"/>
  <text x="800" y="499" text-anchor="middle" class="htext">SALES_TRANSACTIONS</text>
  <text x="602" y="542" class="field pk">PK  transaction_id</text>
  <text x="602" y="570" class="field">order_date</text>
  <text x="602" y="598" class="field fk">FK  store_id</text>
  <text x="602" y="626" class="field fk">FK  product_id</text>
  <text x="602" y="654" class="field fk">FK  customer_id</text>
  <text x="602" y="682" class="field fk">FK  promo_id</text>
  <text x="602" y="710" class="field">channel</text>
  <text x="602" y="738" class="field">units_sold</text>
  <text x="602" y="766" class="field">sales_amount</text>
  <text x="602" y="794" class="field">discount_amount</text>
  <text x="602" y="822" class="field">gross_profit</text>

  <!-- INVENTORY_SNAPSHOTS -->
  <rect x="110" y="520" width="350" height="280" class="box"/>
  <rect x="110" y="520" width="350" height="44" class="header"/>
  <text x="285" y="549" text-anchor="middle" class="htext">INVENTORY_SNAPSHOTS</text>
  <text x="132" y="592" class="field pk">PK  snapshot_id</text>
  <text x="132" y="620" class="field">snapshot_date</text>
  <text x="132" y="648" class="field fk">FK  store_id</text>
  <text x="132" y="676" class="field fk">FK  product_id</text>
  <text x="132" y="704" class="field">stock_on_hand</text>
  <text x="132" y="732" class="field">reorder_point</text>
  <text x="132" y="760" class="field">days_of_cover</text>

  <!-- Relationships -->
  <!-- STORES to SALES -->
  <path d="M360 260 C470 260, 500 598, 580 598" class="line"/>
  <text x="450" y="418" class="label">1 to many</text>

  <!-- PRODUCTS to SALES -->
  <path d="M800 400 C800 430, 800 440, 800 470" class="line"/>
  <text x="820" y="440" class="label">1 to many</text>

  <!-- CUSTOMERS to SALES -->
  <path d="M1180 240 C1080 240, 1060 654, 1020 654" class="line"/>
  <text x="1080" y="448" class="label">1 to many</text>

  <!-- PROMOTIONS to SALES -->
  <path d="M1180 555 C1090 555, 1080 682, 1020 682" class="line"/>
  <text x="1070" y="610" class="label">1 to many</text>

  <!-- STORES to INVENTORY -->
  <path d="M215 370 C215 430, 215 460, 215 520" class="line"/>
  <text x="235" y="450" class="label">1 to many</text>

  <!-- PRODUCTS to INVENTORY -->
  <path d="M650 260 C520 260, 510 676, 460 676" class="line"/>
  <text x="515" y="468" class="label">1 to many</text>
</svg>
